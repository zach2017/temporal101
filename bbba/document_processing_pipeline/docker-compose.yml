# ╔══════════════════════════════════════════════════════════════════╗
# ║  Document Processing Pipeline – Full Stack Docker Compose       ║
# ║                                                                 ║
# ║  No S3/LocalStack.  All workers share a /files volume.          ║
# ║  Source files:  /files/<filename>                               ║
# ║  Output:        /files/output/<document_name>/                  ║
# ║                   ├── extracted_text.json                       ║
# ║                   └── extracted_images/                         ║
# ╚══════════════════════════════════════════════════════════════════╝

name: document-processing-pipeline

services:

  # ════════════════════════════════════════════════════════════
  #  INFRASTRUCTURE
  # ════════════════════════════════════════════════════════════

  postgresql:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 30
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - pipeline

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ELASTICSEARCH_VERSION:-8.17.4}
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - pipeline

  # ════════════════════════════════════════════════════════════
  #  SHARED FILES VOLUME INIT
  #
  #  Copies host ./sample_docs into the shared volume and
  #  creates the output directory structure.
  # ════════════════════════════════════════════════════════════

  files-init:
    image: busybox:latest
    volumes:
      - ${DOCS_SOURCE_DIR:-./sample_docs}:/source:ro
      - shared_files:/files
    entrypoint: >
      /bin/sh -c "
        mkdir -p /files/output &&
        echo 'Syncing files from host into /files ...' &&
        cp -rv /source/* /files/ 2>/dev/null || true &&
        echo '--- /files contents ---' &&
        ls -la /files/ &&
        echo 'Files init complete.'
      "

  # ════════════════════════════════════════════════════════════
  #  TEMPORAL
  # ════════════════════════════════════════════════════════════

  temporal-server:
    image: temporalio/auto-setup:${TEMPORAL_VERSION:-latest}
    depends_on:
      postgresql:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PWD=${POSTGRES_PASSWORD}
      - POSTGRES_SEEDS=postgresql
      - ENABLE_ES=true
      - ES_SEEDS=elasticsearch
      - ES_VERSION=v7
      - TEMPORAL_ADDRESS=host.docker.internal:7233
      - TEMPORAL_CLI_ADDRESS=host.docker.internal:7233
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    volumes:
      - ./dynamicconfig:/etc/temporal/config/dynamicconfig
    ports:
      - "7233:7233"
    healthcheck:
      test: ["CMD-SHELL", "temporal operator cluster health --address host.docker.internal:7233 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 40s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - pipeline

  temporal-ui:
    image: temporalio/ui:${TEMPORAL_UI_VERSION:-latest}
    depends_on:
      temporal-server:
        condition: service_healthy
    environment:
      - TEMPORAL_ADDRESS=host.docker.internal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - pipeline

  # ════════════════════════════════════════════════════════════
  #  JAVA TIKA WORKER
  # ════════════════════════════════════════════════════════════

  tika-worker:
    build:
      context: ./tika_worker
      dockerfile: Dockerfile
    depends_on:
      temporal-server:
        condition: service_healthy
      files-init:
        condition: service_completed_successfully
    environment:
      TEMPORAL_HOST: ${TEMPORAL_HOST}
      TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE}
      TEMPORAL_TIKA_TASK_QUEUE: ${TEMPORAL_TIKA_TASK_QUEUE}
    volumes:
      - shared_files:/files
    restart: unless-stopped
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 768M
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - pipeline

  # ════════════════════════════════════════════════════════════
  #  PYTHON WORKERS – all share /files volume
  # ════════════════════════════════════════════════════════════

  intake-worker:
    build:
      context: ./document_processing_worker
      dockerfile: Dockerfile
      target: intake-worker
    depends_on:
      temporal-server:
        condition: service_healthy
      files-init:
        condition: service_completed_successfully
    environment: &worker-env
      TEMPORAL_HOST: ${TEMPORAL_HOST}
      TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE}
      TEMPORAL_TASK_QUEUE: ${TEMPORAL_TASK_QUEUE}
      TEMPORAL_TIKA_TASK_QUEUE: ${TEMPORAL_TIKA_TASK_QUEUE}
      TEMPORAL_PDF_TASK_QUEUE: ${TEMPORAL_PDF_TASK_QUEUE}
      TEMPORAL_OCR_TASK_QUEUE: ${TEMPORAL_OCR_TASK_QUEUE}
      TEMPORAL_CONVERSION_TASK_QUEUE: ${TEMPORAL_CONVERSION_TASK_QUEUE}
      SHARED_FILES_PATH: ${SHARED_FILES_PATH}
      MAX_CONCURRENT_ACTIVITIES: ${MAX_CONCURRENT_ACTIVITIES}
      ACTIVITY_HEARTBEAT_TIMEOUT_SECONDS: ${ACTIVITY_HEARTBEAT_TIMEOUT_SECONDS}
      ACTIVITY_START_TO_CLOSE_TIMEOUT_SECONDS: ${ACTIVITY_START_TO_CLOSE_TIMEOUT_SECONDS}
      ACTIVITY_MAX_RETRIES: ${ACTIVITY_MAX_RETRIES}
    volumes:
      - shared_files:/files
    restart: unless-stopped
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 256M
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - pipeline

  pdf-worker:
    build:
      context: ./document_processing_worker
      dockerfile: Dockerfile
      target: pdf-worker
    depends_on:
      temporal-server:
        condition: service_healthy
      files-init:
        condition: service_completed_successfully
    environment: *worker-env
    volumes:
      - shared_files:/files
    restart: unless-stopped
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 512M
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - pipeline

  ocr-worker:
    build:
      context: ./document_processing_worker
      dockerfile: Dockerfile
      target: ocr-worker
    depends_on:
      temporal-server:
        condition: service_healthy
      files-init:
        condition: service_completed_successfully
    environment: *worker-env
    volumes:
      - shared_files:/files
    restart: unless-stopped
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 512M
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - pipeline

  conversion-worker:
    build:
      context: ./document_processing_worker
      dockerfile: Dockerfile
      target: conversion-worker
    depends_on:
      temporal-server:
        condition: service_healthy
      files-init:
        condition: service_completed_successfully
    environment: *worker-env
    volumes:
      - shared_files:/files
    restart: unless-stopped
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 512M
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - pipeline

  # ════════════════════════════════════════════════════════════
  #  JAVA CLIENT (on-demand)
  # ════════════════════════════════════════════════════════════

  java-client:
    build:
      context: ./document_processing_java_client
      dockerfile: Dockerfile
    profiles:
      - client
    depends_on:
      temporal-server:
        condition: service_healthy
      files-init:
        condition: service_completed_successfully
    environment:
      TEMPORAL_HOST: ${TEMPORAL_HOST}
      TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE}
      TEMPORAL_TASK_QUEUE: ${TEMPORAL_TASK_QUEUE}
    volumes:
      - shared_files:/files
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - pipeline

# ════════════════════════════════════════════════════════════
#  VOLUMES & NETWORKS
# ════════════════════════════════════════════════════════════

volumes:
  postgres_data:
  es_data:
  shared_files:
    driver: local

networks:
  pipeline:
    driver: bridge

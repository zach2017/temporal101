version: "3.9"

services:
  # ── Backend: FastAPI code generator ──────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: temporal-builder-api
    ports:
      - "8000:8000"
    volumes:
      - ./generated:/app/generated
      - ./backend:/app/src
    environment:
      - GENERATED_DIR=/app/generated
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  # ── Frontend: Nginx serving static drag-and-drop UI ─────────
  ui:
    image: nginx:alpine
    container_name: temporal-builder-ui
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: unless-stopped

version: "3.8"

services:
  # ─── Database ───────────────────────────────────────────────
  postgresql:
    image: postgres:17
    container_name: temporal-postgresql
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    ports:
      - "5432:5432"
    volumes:
      - postgresql_data:/var/lib/postgresql/data
    networks:
      - temporal-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Temporal Server ────────────────────────────────────────
  # NOTE: auto-setup runs schema migration + namespace creation on first start.
  # This takes 20-40 seconds. Workers and app will retry connections automatically.
  temporal:
    image: temporalio/auto-setup:latest
    container_name: temporal-server
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=postgresql
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CLI_ADDRESS=temporal:7233
    volumes:
      - ./dynamicconfig:/etc/temporal/config/dynamicconfig
    ports:
      - "7233:7233"
    networks:
      - temporal-network

  # ─── Temporal Web UI ────────────────────────────────────────
  temporal-ui:
    image: temporalio/ui:latest
    container_name: temporal-ui
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    ports:
      - "8080:8080"
    networks:
      - temporal-network

  # ─── Spring Boot App (REST API + Static UI) ────────────────
  spring-boot-app:
    build:
      context: ./spring-boot-app
      dockerfile: Dockerfile
    container_name: temporal-spring-app
    depends_on:
      - temporal
    restart: on-failure
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - SERVER_PORT=8081
    ports:
      - "8081:8081"
    networks:
      - temporal-network

  # ─── Java Temporal Worker ───────────────────────────────────
  java-worker:
    build:
      context: ./java-worker
      dockerfile: Dockerfile
    container_name: temporal-java-worker
    depends_on:
      - temporal
    restart: on-failure
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    networks:
      - temporal-network

  # ─── Python Temporal Worker ─────────────────────────────────
  python-worker:
    build:
      context: ./python-worker
      dockerfile: Dockerfile
    container_name: temporal-python-worker
    depends_on:
      - temporal
    restart: on-failure
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    networks:
      - temporal-network

volumes:
  postgresql_data:

networks:
  temporal-network:
    driver: bridge

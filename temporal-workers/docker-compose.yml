
services:

  workers:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - TEMPORAL_HOST=temporal
      - TEMPORAL_PORT=7233
      - TEMPORAL_NAMESPACE=default
      - WORKER_LOG_LEVEL=INFO
      - WORKER_MAX_CONCURRENT_ACTIVITIES=10
      - WORKER_MAX_CONCURRENT_WORKFLOWS=10
   

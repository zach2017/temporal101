version: "3.8"

services:
  # ── PostgreSQL for Temporal persistence ──
  postgresql:
    image: postgres:17
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Temporal Server (auto-setup) ──
  temporal:
    image: temporalio/auto-setup
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=postgresql
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    ports:
      - "7233:7233"
    volumes:
      - ./dynamicconfig:/etc/temporal/config/dynamicconfig
    healthcheck:
      test: ["CMD", "echo"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  # ── Temporal Web UI ──
  temporal-ui:
    image: temporalio/ui
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:8080,http://localhost:3000
    ports:
      - "8088:8080"

  # ── Python Worker + FastAPI ──
  python-worker:
    build:
      context: ./python-worker
      dockerfile: Dockerfile
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - STORAGE_PATH=/app/storage
    ports:
      - "8077:8080"
    volumes:
      - ./storage:/app/storage

volumes:
  postgres_data:

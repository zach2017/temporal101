spring.application.name=docupload

# Server
server.port=3000

# ── Multipart upload limits ───────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB

# ── Async MVC timeout — allow long processing (60 s) ─────────────────────────
spring.mvc.async.request-timeout=60000

# ══════════════════════════════════════════════════════════════════════════════
#  TEMPORAL CONFIGURATION
# ══════════════════════════════════════════════════════════════════════════════
#
#  HOW TO CONNECT TO TEMPORAL
#  ──────────────────────────
#  LOCAL DEV (default below):
#    1. Install:  brew install temporal
#                 OR: go install go.temporal.io/server/cmd/temporal@latest
#    2. Start:    temporal server start-dev
#    3. Web UI:   http://localhost:8233
#
#  DOCKER:
#    docker run --rm -p 7233:7233 -p 8233:8233 \
#      temporalio/auto-setup:latest temporal server start-dev
#
#  TEMPORAL CLOUD (production):
#    spring.temporal.connection.target=<namespace>.tmprl.cloud:7233
#    spring.temporal.namespace=<your-namespace>
#    spring.temporal.connection.mtls.key-file=/path/to/client.key
#    spring.temporal.connection.mtls.cert-chain-file=/path/to/client.crt
# ──────────────────────────────────────────────────────────────────────────────

# Temporal server address (local dev server)
spring.temporal.connection.target=127.0.0.1:7233

# Temporal namespace — "default" exists out-of-the-box on the dev server
spring.temporal.namespace=default

# Auto-discovery: scan these packages for @WorkflowImpl / @ActivityImpl beans
# The starter will create workers and register implementations automatically.
spring.temporal.workers-auto-discovery.packages=com.docupload.temporal

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.docupload=DEBUG
logging.level.org.springframework.web=INFO
# Set to INFO to see Temporal SDK lifecycle messages; WARN to reduce noise
logging.level.io.temporal=INFO
logging.level.io.grpc=WARN
